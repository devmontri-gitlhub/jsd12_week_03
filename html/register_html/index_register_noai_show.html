<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm & Direct Save to Excel</title>
    <!-- XLSX Library for Excel manipulation -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; font-weight: 600; width: 35%; }
        tr:nth-child(even) { background-color: #fdfdfd; }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button, .back-btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 14px; transition: opacity 0.2s; }
        .save-btn { background-color: #28a745; color: white; }
        .back-btn { background-color: #6c757d; color: white; display: inline-block; }
        button:hover { opacity: 0.9; }
        .chart-container { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .status-msg { margin-top: 10px; font-weight: bold; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Please Confirm Your Information</h2>
        <div id="data-display">
             <p>Analyzing form data...</p>
        </div>

        <div class="button-group">
            <button onclick="saveDirectlyToExcel()" class="save-btn">Confirm and Save to register.xlsx (Directly)</button>
            <a href="index_register_noai.html" class="back-btn">Back to Edit</a>
        </div>
        <div id="status-display" class="status-msg"></div>

        <div class="chart-container">
            <h3>Visual Information Display</h3>
            <canvas id="registrationChart"></canvas>
        </div>
    </div>

    <script>
        // Extract parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userData = {};
        
        let tableHtml = "<table>";
        urlParams.forEach((value, key) => {
            userData[key] = value;
            let displayKey = key.charAt(0).toUpperCase() + key.slice(1);
            let displayValue = (key === 'password') ? '********' : value;
            tableHtml += `<tr><th>${displayKey}</th><td>${displayValue}</td></tr>`;
        });
        tableHtml += "</table>";
        document.getElementById('data-display').innerHTML = tableHtml;

        // --- DIRECT FILE SAVE LOGIC ---
        async function saveDirectlyToExcel() {
            const status = document.getElementById('status-display');
            status.textContent = "Processing...";
            
            try {
                // 1. Create workbook from current data
                const wsData = [Object.keys(userData), Object.values(userData).map(v => Array.isArray(v) ? v.join(", ") : v)];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Registration");
                
                // 2. Convert workbook to binary blob
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                // 3. Use File System Access API to pick file once and save
                if ('showSaveFilePicker' in window) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'register.xlsx',
                        types: [{
                            description: 'Excel file',
                            accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] },
                        }],
                    });
                    
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    
                    status.textContent = "Successfully saved directly to " + handle.name;
                    alert("Data has been saved directly to: " + handle.name);
                } else {
                    XLSX.writeFile(wb, "register.xlsx");
                    status.textContent = "Saved (using browser download method)";
                }
            } catch (err) {
                console.error(err);
                if (err.name === 'AbortError') {
                    status.textContent = "Save cancelled.";
                } else {
                    status.textContent = "Error saving file: " + err.message;
                    alert("Error: " + err.message);
                }
            }
        }

        // --- CHART VISUALIZATION ---
        const ctx = document.getElementById('registrationChart').getContext('2d');
        const skillLevel = parseInt(userData.skill) || 0;
        const age = parseInt(userData.age) || 0;

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Skill Level (%)', 'Age (Years)'],
                datasets: [{
                    label: 'User Statistics',
                    data: [skillLevel, age],
                    backgroundColor: ['rgba(54, 162, 235, 0.6)', 'rgba(255, 99, 132, 0.6)'],
                    borderColor: ['rgba(54, 162, 235, 1)', 'rgba(255, 99, 132, 1)'],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, max: 100 }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
